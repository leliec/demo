<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2000 Years of Chinese Stories</title>
    <!-- change to your github path!  -->
    <link rel="stylesheet" href="/demo/index.css" />
  </head>
  <body>
    <header>
      <h1>2000 Years of Chinese Stories</h1>
      <p>Tools for webnovel creating</p>
    </header>

    <main class="card-container">
      <div
        class="card"
        data-content="Explore narrative patterns across dynasties — from Tang anecdotes to modern web fiction."
      >
        <h2>📜 Story Archive</h2>
        <p>Ancient to modern Chinese fiction</p>
      </div>

      <div
        class="card"
        data-content="Analyze character traits, relationships, and narrative structures using NLP-based tools."
      >
        <h2>🧠 Analysis Tools</h2>
        <p>Character and theme modeling</p>
      </div>

      <div
        class="card"
        data-content="Collaborate and design your own webnovel universe with AI-assisted tools and templates."
      >
        <h2>✨ Creation Suite</h2>
        <p>Build your world</p>
      </div>
    </main>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-content">
        <span id="close-btn">&times;</span>
        <p id="overlay-text"></p>
      </div>
    </div>

    <footer>
      <p>© 2025 Zoey| Built for open creative exploration</p>
    </footer>
    <!-- change to your path! -->
    <script src="/demo/index.js"></script>
  </body>
</html>
